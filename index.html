<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devfolio</title>
    <script>
      // Anti-flash: apply the persisted (or default dark) theme before React
      // mounts. Mirrors the zustand persist shape in features/theme/store.ts.
      try {
        const saved = JSON.parse(localStorage.getItem('devfolio-theme'))
        if (saved?.state?.theme !== 'light') {
          document.documentElement.classList.add('dark')
        }
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
